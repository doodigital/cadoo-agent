name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Cadoo — traces conversations, LLM calls, and tool usage. Opt-in via `cadoo plugins enable observability/langfuse` or `cadoo tools → Langfuse Observability`."
author: DooStudio
requires_env:
  - HERMES_LANGFUSE_PUBLIC_KEY
  - HERMES_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
